<!DOCTYPE html>
<html lang="pt-br" class="running music-on">
    <head>
        <link
            href="https://fonts.googleapis.com/css?family=Roboto:100,100italic,300,300italic,regular,italic,500,500italic,700,700italic,900,900italic"
            rel="stylesheet"
        />
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Temporizador estilo pomodoro" />
        <link
            rel="shortcut icon"
            href="../assets/favicon.svg"
            type="image/x-svg"
        />
        <title>Focus Timer - Pomodoro</title>
        <script type="module" src="main.js" defer></script>
        <link rel="stylesheet" href="style.css" />
        <script src="https://unpkg.com/@phosphor-icons/web"></script>
    </head>
    <body>
        <div id="app">
            <!-- <button id="toggle-mode">
                <span>ativar e desativar light mode</span>
                <i class="ph-bold ph-sun"></i>
                <i class="ph-bold ph-moon"></i>
            </button> -->

            <section id="timer" class="flex">
                <span id="minutes">00</span>
                <span>:</span>
                <span id="seconds">00</span>
            </section>

            <section id="controls" class="flex">
                <button class="ph ph-play-circle"></button>
                <button class="ph ph-pause-circle"></button>
                <button class="ph ph-timer secondary"></button>
                <button class="ph ph-stop-circle secondary"></button>
                <button class="ph ph-speaker-none secondary"></button>
                <button class="ph ph-speaker-high"></button>
            </section>
        </div>
    </body>
</html>
